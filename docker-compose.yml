# ──────────────────────────────────────────────────────────────
#  docker-compose.yml — crypto-signal-bot
#
#  Security posture:
#   - No `ports:` are published. The bot is a pure OUTBOUND client
#     (exchanges / data sources / Telegram) and has zero inbound surface.
#   - Secrets are injected at RUNTIME via env_file — never baked into the image.
#   - Private config + the SQLite journal are host bind-mounts, not image layers.
#   - Containers run as the non-root user defined in the Dockerfile.
#
#  Two long-running services:
#   - collectors → writes market data into storage.db
#   - engine     → the only reader; scores, gates, (dry-run) executes
#  Plus two one-shot helpers behind the `tools` profile: init, postmortem.
#
#  First-run + usage instructions are in README / the deploy notes.
# ──────────────────────────────────────────────────────────────

x-bot-common: &bot-common
  build: .
  image: crypto-signal-bot:latest
  restart: unless-stopped
  env_file:
    - ./config/secrets.env            # injected at runtime, NOT in the image
  volumes:
    - ./config/config.yaml:/app/config/config.yaml:ro   # private, read-only
    - ./storage.db:/app/storage.db                      # the journal, host-persisted
  networks:
    - botnet

services:
  collectors:
    <<: *bot-common
    container_name: bot-collectors
    command: python scripts/run_collectors.py

  engine:
    <<: *bot-common
    container_name: bot-engine
    command: python scripts/run_engine.py
    depends_on:
      - collectors

  # ── One-shot helpers — run on demand, never with `up`. ──
  #   docker compose run --rm init
  #   docker compose run --rm postmortem --days 7 --telegram
  init:
    <<: *bot-common
    container_name: bot-init
    profiles: ["tools"]
    restart: "no"
    command: python scripts/init_db.py

  postmortem:
    <<: *bot-common
    container_name: bot-postmortem
    profiles: ["tools"]
    restart: "no"
    command: python scripts/run_postmortem.py

networks:
  botnet:
    driver: bridge          # private; nothing is published onto it
