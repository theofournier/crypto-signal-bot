# ──────────────────────────────────────────────────────────────
#  docker-compose.yml — crypto-signal-bot
#
#  Security posture:
#   - No `ports:` are published. The bot is a pure OUTBOUND client
#     (exchanges / data sources / Telegram) and has zero inbound surface.
#   - Secrets are injected at RUNTIME via env_file — never baked into the image.
#   - Private config + the SQLite journal are host bind-mounts, not image layers.
#   - Containers run as the non-root user defined in the Dockerfile.
#
#  Two long-running services:
#   - collectors → writes market data into storage.db
#   - engine     → the only reader; scores, gates, (dry-run) executes
#  Plus two one-shot helpers behind the `tools` profile: init, postmortem.
#
#  Opt-in read-only dashboard behind the `dashboard` profile:
#     docker compose --profile dashboard up -d --build dashboard
#   It is the ONE service with an inbound port — deliberately published on
#   127.0.0.1 only (loopback), so it is reachable from the host but never
#   exposed on the network. It opens storage.db read-only and never writes.
#
#  First-run + usage instructions are in README / the deploy notes.
# ──────────────────────────────────────────────────────────────

# The container runs as a non-root user whose UID/GID match the HOST user that
# owns the bind-mounted storage.db / config.yaml — otherwise SQLite hits
# "attempt to write a readonly database". On a host where `id -u` isn't 1000,
# pin them once before building:
#     printf "PUID=%s\nPGID=%s\n" "$(id -u)" "$(id -g)" > .env
# Compose auto-loads .env; rebuild (`up -d --build`) after changing it.
x-bot-common: &bot-common
  build:
    context: .
    args:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
  image: crypto-signal-bot:latest
  restart: unless-stopped
  env_file:
    - ./config/secrets.env            # injected at runtime, NOT in the image
  volumes:
    - ./config/config.yaml:/app/config/config.yaml:ro   # private, read-only
    - ./storage.db:/app/storage.db                      # the journal, host-persisted
  networks:
    - botnet

services:
  collectors:
    <<: *bot-common
    container_name: bot-collectors
    command: python scripts/run_collectors.py

  engine:
    <<: *bot-common
    container_name: bot-engine
    command: python scripts/run_engine.py
    depends_on:
      - collectors

  init:
    <<: *bot-common
    container_name: bot-init
    profiles: ["tools"]
    restart: "no"
    command: python scripts/init_db.py

  seeddata:
    <<: *bot-common
    container_name: bot-seed-data
    profiles: ["tools"]
    restart: "no"
    command: python scripts/seed_data.py

  seedsentiment:
    <<: *bot-common
    container_name: bot-seed-sentiment
    profiles: ["tools"]
    restart: "no"
    command: python scripts/seed_sentiment.py

  postmortem:
    <<: *bot-common
    container_name: bot-postmortem
    profiles: ["tools"]
    restart: "no"
    command: python scripts/run_postmortem.py

  backtest:
    <<: *bot-common
    container_name: bot-backtest
    profiles: ["tools"]
    restart: "no"
    command: python scripts/run_backtest.py


  dashboard:
    build:
      context: ./dashboard
    image: crypto-signal-bot-dashboard:latest
    container_name: bot-dashboard
    profiles: ["dashboard"]
    restart: unless-stopped
    volumes:
      - ./storage.db:/app/storage.db:ro   # the journal, read-only
    networks:
      - botnet
      - proxy
    labels:
      traefik.enable: true
      traefik.http.routers.crypto-bot.rule: "Host(`crypto-bot-private.${DOMAIN}`)"
      traefik.http.routers.crypto-bot.entrypoints: "web"
      traefik.http.routers.crypto-bot.middlewares: "security-headers@file"
      traefik.http.services.crypto-bot.loadbalancer.server.port: 3000

  # ── Local LLM for sentiment (opt-in) ──
  #   docker compose --profile llm up -d                  # start the server
  #   docker compose --profile llm run --rm ollama-pull   # pull the model once
  # Internal only — NO ports published; the collectors reach it at
  # http://ollama:11434 over botnet. If it isn't running, the sentiment classifier
  # falls back to the rule-based lexicon, so this service is purely additive.
  # Enable it by setting sentiment.classifier.type: "ollama" and
  # base_url: "http://ollama:11434" in config.yaml.
  ollama:
    image: ollama/ollama:latest         # prebuilt; unrelated to the bot image
    container_name: bot-ollama
    profiles: ["llm"]
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama     # persist pulled models across restarts
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    # GPU (optional, NVIDIA): uncomment to accelerate; CPU is fine for 3B models.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - {driver: nvidia, count: 1, capabilities: [gpu]}

  # One-shot: pull the model into the volume (run once after the server is up).
  ollama-pull:
    image: ollama/ollama:latest
    container_name: bot-ollama-pull
    profiles: ["llm"]
    restart: "no"
    environment:
      OLLAMA_HOST: "http://ollama:11434"  # talk to the server, don't start a new one
    entrypoint: ["ollama", "pull", "llama3.2:3b"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - botnet

networks:
  botnet:
    driver: bridge          # private; nothing is published onto it

volumes:
  ollama-models:            # named volume for pulled LLM models (can be GBs)
