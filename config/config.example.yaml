# ──────────────────────────────────────────────────────────────
#  config.example.yaml — PUBLIC TEMPLATE (safe defaults)
#
#  Copy this to config/config.yaml (which is gitignored) and tune
#  there. Your tuned config.yaml is your private edge — never commit it.
#
#      cp config/config.example.yaml config/config.yaml
# ──────────────────────────────────────────────────────────────

mode:
  dry_run: true              # THE most important switch. Keep true until fully validated.

scoring:
  weights:                   # must sum to ~1.0; tune from your journal over time
    market: 0.40             # hard data — highest weight
    onchain: 0.25
    sentiment: 0.35          # noisy — lower weight
  threshold: 72              # composite (0–100) must clear this to fire
  require_agreement: true    # all active sources must agree on direction

risk:
  kelly_fraction: 0.25       # quarter-Kelly (real edges are smaller than backtests claim)
  max_open_positions: 3
  max_drawdown_pause: 0.15   # pause new entries after a 15% drawdown
  volatility_filter: true
  volatility_spike_mult: 2.5 # sit out when bb_width > 2.5x its recent median (chaotic spike)
  min_edge_over_fees: 1.5    # skip signals whose expected move < 1.5x the round-trip fee
  bankroll: 10000            # capital used for position sizing (quote currency, e.g. USDT)
  # starting assumptions used only until the journal has real stats:
  default_win_rate: 0.50
  default_reward_risk: 2.0

fees:
  # Set these to YOUR exchange's tier. Defaults ≈ Binance base spot (0.10%).
  # Round-trip cost ≈ 2 x (maker or taker). Fees are deducted on EVERY fill,
  # in dry-run and live alike — otherwise backtests are fiction.
  maker_pct: 0.0010          # 0.10% — limit orders (you add liquidity)
  taker_pct: 0.0010          # 0.10% — market orders (you remove liquidity)
  prefer_maker: true         # enter/exit with limit orders when possible to pay the lower fee

exits:
  reward_risk_ratio: 2.0     # take-profit distance = 2x the stop distance
  stop_method: "atr"         # "atr" (volatility-based) or "fixed_pct"
  stop_fixed_pct: 0.03       # used only if stop_method == "fixed_pct"
  atr_multiplier: 2.0        # used only if stop_method == "atr"
  use_trailing_stop: false
  max_hold_hours: 48         # time-based exit

universe:
  # Watchlist, not a position cap — risk.max_open_positions still bounds how many
  # of these can be held at once. Widen freely; every pair is scored each cycle.
  # Keep to liquid pairs with long Binance Data Vision history (seedable offline).
  pairs:
    - "BTC/USDT"     # anchor — regime reference
    - "ETH/USDT"     # anchor — risk-on reference
    - "SOL/USDT"     # workhorse — liquid + volatile
    - "AVAX/USDT"    # workhorse — volatile L1, deep book
    - "SUI/USDT"     # workhorse — high realized vol
    - "NEAR/USDT"    # workhorse — trends cleanly
    - "LINK/USDT"    # on-chain — real flow signal (oracle/DeFi)
    - "INJ/USDT"     # volatility — volatile L1 for momentum signals
    - "DOGE/USDT"    # sentiment — where the social source earns its weight
    - "TIA/USDT"     # sentiment/vol — narrative-driven
  timeframe: "1h"
  exchange: "binance"        # public market data; no key needed for reads

onchain:
  # On-chain collector (Phase 9): exchange flow + whale transfers / TVL -> onchain_data.
  enabled: true              # set false (or run with --no-onchain) to skip it
  poll_seconds: 300          # slow — on-chain APIs rate-limit
  window_hours: 1            # aggregate exchange flows over this trailing window
  whale_usd: 1000000         # a single transfer >= this USD counts as a whale move
  flow_deadband: 0.05        # |net_flow| below this fraction => neutral (no direction)

  # Sources tried in order; the FIRST that covers an asset serves it. They are
  # complementary: Etherscan reads CEX flows for ERC-20 tokens (needs
  # ETHERSCAN_API_KEY in secrets.env); bitcoin_esplora reads native-BTC CEX flows
  # (free, no key); DefiLlama reads chain TVL momentum for native L1/L2 coins (free,
  # no key). Order matters — bitcoin_esplora before defillama so BTC gets its real
  # flow reading instead of DefiLlama's tiny BTC-DeFi TVL proxy. An asset no source
  # covers writes nothing.
  providers: ["etherscan", "bitcoin_esplora", "defillama"]

  etherscan:
    # Coverage registry — EDIT HERE, no code change. One block per EVM chain
    # (Etherscan v2 serves them all from one key by chain_id). List each chain's
    # known CEX hot wallets and map each base asset to its contract on that chain.
    # Add a token under the right chain's `tokens:`; add a chain (BSC=56,
    # Polygon=137, Arbitrum=42161, Base=8453, …) as a new block.
    chains:
      ethereum:
        chain_id: 1
        cex_addresses:      # known CEX hot wallets (more = better flow coverage)
          - "0x28c6c06298d514db089934071355e5743bf21d60"  # Binance 14
          - "0x21a31ee1afc51d94c2efccaa2092ad1028285549"  # Binance 15
          - "0xdfd5293d8e347dfe59e90efd55b2956a1343963d"  # Binance 16
          - "0x56eddb7aa87536c09ccc2793473599fd21a8b17f"  # Binance 17
        tokens:             # base asset -> ERC-20 contract on this chain
          LINK: "0x514910771af9ca656af840dff83e8264ecf986ca"
          UNI:  "0x1f9840a85d5af5bf1d1762f925bdaddc4201f984"
          AAVE: "0x7fc66500c84a76ad7e9c93437bfc5ac33e2ddae9"

  bitcoin_esplora:
    # Native-BTC CEX flows via the free, keyless Esplora API (blockstream.info).
    # Scans each known exchange wallet's recent txs and nets deposits (onto the
    # exchange) vs withdrawals (leaving) into a true-flow reading — same quality as
    # Etherscan, for BTC. Bitcoin addresses are CASE-SENSITIVE — paste them verbatim.
    # A busy *hot* wallet (high tx count) carries most of the flow; cold wallets move
    # rarely. Verify/extend this list with your exchange's wallets.
    assets: ["BTC"]            # base assets this source covers
    max_pages: 4               # Esplora pages ~25 txs each; cap per address per cycle
    cex_addresses:
      - "34xp4vRoCGJym3xR7yCVPFHoCNxv4Twseo"                              # Binance cold
      - "bc1qgdjqv0av3q56jvd82tkdjpy7gdp9ut8tlqmgrpmv24sq90ecnvqqjwvw97"  # Bitfinex cold
      - "bc1qm34lsc65zpw79lxes69zkqmk6ee3ewf0j77s3h"                      # busy hot wallet (flow-rich)

  defillama:
    # Maps a base asset to its DefiLlama chain slug; rising chain TVL reads as
    # accumulation, falling as distribution. Free, no key. Edit/extend freely.
    lookback_days: 1         # compare TVL now vs this many days ago
    chains:
      ETH:  "Ethereum"
      SOL:  "Solana"
      AVAX: "Avalanche"
      NEAR: "Near"
      SUI:  "Sui"
      INJ:  "Injective"
      BTC:  "Bitcoin"

data:
  history_days: 180          # how much to seed for backtesting

notifications:
  telegram_enabled: false    # set true and add keys in secrets.env to get alerts
